<script>
// ── Particle system ──────────────────────────────────────────────────────────
(function(){
  const canvas = document.getElementById('particles-canvas');
  const ctx    = canvas.getContext('2d');
  const GOLD   = 'rgba(190,159,65,';
  let W, H, particles = [], mouse = {x:-9999,y:-9999};

  function resize(){
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function rand(a,b){ return a + Math.random()*(b-a); }

  function Particle(){
    this.reset = function(init){
      this.x    = rand(0,W);
      this.y    = init ? rand(0,H) : H + 10;
      this.r    = rand(0.6,2.2);
      this.vx   = rand(-0.15,0.15);
      this.vy   = rand(-0.35,-0.08);
      this.a    = rand(0.08,0.45);
      this.da   = rand(-0.0004,0.0004);
      this.life = rand(0.6,1);
      this.age  = 0;
    };
    this.reset(true);

    this.update = function(){
      this.x  += this.vx;
      this.y  += this.vy;
      this.a  += this.da;
      this.a   = Math.max(0.04, Math.min(0.55, this.a));
      this.age += 0.003;

      // subtle mouse repulsion
      let dx = this.x - mouse.x, dy = this.y - mouse.y;
      let dist = Math.sqrt(dx*dx+dy*dy);
      if(dist < 90){
        let force = (90-dist)/90 * 0.4;
        this.vx += dx/dist * force * 0.06;
        this.vy += dy/dist * force * 0.06;
      }

      if(this.y < -10 || this.age > this.life) this.reset(false);
    };

    this.draw = function(){
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
      ctx.fillStyle = GOLD + this.a + ')';
      ctx.fill();
    };
  }

  function init(){
    resize();
    particles = [];
    let count = Math.floor((W*H)/12000);
    count = Math.max(40, Math.min(count, 130));
    for(let i=0;i<count;i++){
      let p = new Particle();
      particles.push(p);
    }
  }

  // Connection lines between nearby particles
  function drawLines(){
    for(let i=0;i<particles.length;i++){
      for(let j=i+1;j<particles.length;j++){
        let dx = particles[i].x - particles[j].x;
        let dy = particles[i].y - particles[j].y;
        let d  = Math.sqrt(dx*dx+dy*dy);
        if(d < 110){
          let alpha = (1 - d/110) * 0.08;
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = GOLD + alpha + ')';
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
  }

  function loop(){
    ctx.clearRect(0,0,W,H);
    drawLines();
    particles.forEach(p=>{ p.update(); p.draw(); });
    requestAnimationFrame(loop);
  }

  window.addEventListener('resize', ()=>{ resize(); init(); });
  document.addEventListener('mousemove', e=>{ mouse.x=e.clientX; mouse.y=e.clientY; });
  document.addEventListener('mouseleave', ()=>{ mouse.x=-9999; mouse.y=-9999; });

  init();
  loop();
})();
</script>

function genEnv(client, creds, sels){
  const lines=[`# BBS Comunicaciones — MCPs`,`# Cliente: ${client.name}`,`# ${new Date().toISOString().slice(0,10)}`,`# ⚠️ PRIVADO — NO SUBIR A GIT`,``];
  sels.forEach(id=>{
    const s=SERVICES.find(x=>x.id===id);
    lines.push(`# ── ${s.label}`);
    (FIELDS[id]||[]).forEach(f=>lines.push(`${f.k}=${creds[id]?.[f.k]||"CONFIGURAR_AQUI"}`));
    lines.push("");
  });
  return lines.join("\n");
}

function genConfig(client, creds, sels){
  const sl=slug(client.name);
  const servers={};
  sels.forEach(id=>{
    const env={};
    (FIELDS[id]||[]).forEach(f=>{env[f.k]=creds[id]?.[f.k]||"CONFIGURAR_AQUI";});
    servers[`${id}-${sl}`]={command:"npx",args:["-y",`@bbs/${id}-mcp`],env};
  });
  return JSON.stringify({mcpServers:servers},null,2);
}

function genConfigWeb(licencia, client, sels){
  const sl=slug(client.name);
  const servers={};
  sels.forEach(id=>{
    servers[`${id}-${sl}`]={
      url:`https://mcp.bbscomunicaciones.com/${id}-mcp`,
      headers:{
        "Authorization":`Bearer ${licencia||"TU-LICENCIA-BBS"}`,
        "X-Client-Id":sl
      }
    };
  });
  return JSON.stringify({mcpServers:servers},null,2);
}

const MCP_API = "https://control.bbscomunicaciones.com/mcp_licencias.php";

async function registrarLicencia(client, dest, sel){
  try {
    const res = await fetch(MCP_API + "?action=registrar", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        cliente:     client.name,
        email:       client.email  || "",
        contacto:    client.contact|| "",
        destino:     dest.type,
        destino_url: dest.url      || "",
        servicios:   sel,
        notas:       client.notes  || "",
      })
    });
    const data = await res.json();
    return data.ok ? data.licencia : null;
  } catch(e) { return null; }
}

  const [step,setStep]=useState(0);
  const [client,setClient]=useState({name:"",contact:"",email:"",notes:""});
  const [dest,setDest]=useState({type:"github",url:"",token:"",user:"",port:"22",path:""});
  const [sel,setSel]=useState([]);
  const [creds,setCreds]=useState({});
  const [active,setActive]=useState(null);
  const [err,setErr]=useState({});
  const [licencia,setLicencia]=useState(null);
  const [registrando,setRegistrando]=useState(false);
  const [platTab,setPlatTab]=useState("desktop");

  const sc=(k,v)=>setClient(c=>({...c,[k]:v}));
  const sd=(k,v)=>setDest(d=>({...d,[k]:v}));
  const scr=(id,k,v)=>setCreds(c=>({...c,[id]:{...(c[id]||{}),[k]:v}}));
  const tog=id=>{setSel(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);if(!active)setActive(id);};

  const validate=()=>{
    if(step===0&&!client.name.trim()){setErr({name:"El nombre del cliente es requerido"});return false;}
    if(step===1&&dest.type!=="local"){
      if(!dest.url.trim()){setErr({url:"La URL es requerida"});return false;}
      if(!dest.token.trim()){setErr({token:"El token / contraseña es requerido"});return false;}
    }
    if(step===2&&sel.length===0){setErr({s:"Selecciona al menos un servicio"});return false;}
    setErr({});return true;
  };
  const next=()=>{if(validate()){setStep(s=>s+1);if(step===2)setActive(sel[0]||null);}};
  const back=()=>setStep(s=>s-1);
  const reset=()=>{setStep(0);setClient({name:"",contact:"",email:"",notes:""});setSel([]);setCreds({});setDest({type:"github",url:"",token:"",user:"",port:"22",path:""});setActive(null);setLicencia(null);setPlatTab("desktop");};

  const generar=async()=>{
    setRegistrando(true);
    const lic = await registrarLicencia(client, dest, sel);
    setLicencia(lic);
    setRegistrando(false);
    setStep(5);
  };

  const sl=slug(client.name||"cliente");

  const Div = ()=><div style={{height:1,background:BORDER,margin:"20px 0"}}/>;

  const renderBody=()=>{

    // PASO 0
    if(step===0) return(
      <div>
        <h2 style={{fontSize:20,fontWeight:800,color:TEXT,marginBottom:4}}>Datos del cliente</h2>
        <p style={{color:TEXT2,fontSize:13,marginBottom:24}}>¿Para quién configuramos los MCPs?</p>
        <BBSInput label="Nombre o empresa" keyN="name" placeholder="Farmacia López" obj={client} setter={sc} req err={err.name}/>
        <BBSInput label="Contacto técnico" keyN="contact" placeholder="Juan López" obj={client} setter={sc}/>
        <BBSInput label="Email" keyN="email" placeholder="juan@farmacia.com" type="email" obj={client} setter={sc}/>
        <div style={{marginBottom:16}}>
          <label style={{display:"block",fontSize:11,fontWeight:600,color:TEXT2,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.06em"}}>Notas</label>
          <textarea value={client.notes} onChange={e=>sc("notes",e.target.value)} placeholder="Ej: solo producción, mantenimiento sábados..."
            className="bbs-input" style={{height:80,resize:"none"}}/>
        </div>
        {client.name&&(
          <div style={{background:"rgba(190,159,65,0.08)",border:`1px solid rgba(190,159,65,0.25)`,borderRadius:10,padding:"10px 14px",fontSize:12,color:GOLD}}>
            🔖 Slug: <code style={{fontWeight:800}}>{sl}</code>
          </div>
        )}
      </div>
    );

    // PASO 1
    if(step===1) return(
      <div>
        <h2 style={{fontSize:20,fontWeight:800,color:TEXT,marginBottom:4}}>Destino de instalación</h2>
        <p style={{color:TEXT2,fontSize:13,marginBottom:20}}>¿Dónde guardar los archivos de configuración?</p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:22}}>
          {DEST.map(dt=>(
            <button key={dt.id} onClick={()=>sd("type",dt.id)}
              style={{padding:"14px 12px",borderRadius:14,border:`1.5px solid ${dest.type===dt.id?GOLD:BORDER}`,
                background:dest.type===dt.id?"rgba(190,159,65,0.07)":BG3,cursor:"pointer",textAlign:"left",transition:"all .15s"}}>
              <div style={{fontSize:22,marginBottom:6}}>{dt.icon}</div>
              <div style={{fontSize:13,fontWeight:700,color:dest.type===dt.id?GOLD:TEXT}}>{dt.label}</div>
              <div style={{fontSize:11,color:TEXT3,marginTop:2}}>{dt.desc}</div>
            </button>
          ))}
        </div>

        {dest.type==="github"&&<>
          <BBSInput label="URL del repositorio GitHub" keyN="url" placeholder="https://github.com/usuario/repo" type="url" obj={dest} setter={sd} req err={err.url}/>
          <BBSInput label="Personal Access Token (PAT)" keyN="token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" type="password" obj={dest} setter={sd} req err={err.token}/>
          <div style={{background:"rgba(190,159,65,0.06)",border:`1px solid rgba(190,159,65,0.2)`,borderRadius:10,padding:"10px 14px",fontSize:11,color:"#c9ab5a",lineHeight:1.6}}>
            💡 <strong>github.com → Settings → Developer Settings → Personal access tokens</strong><br/>
            Activa el permiso <code style={{background:"rgba(190,159,65,0.15)",padding:"1px 5px",borderRadius:4,color:GOLD}}>repo</code>
          </div>
        </>}
        {dest.type==="ssh"&&<>
          <BBSInput label="Host / IP del servidor" keyN="url" placeholder="192.168.1.1 o servidor.com" obj={dest} setter={sd} req err={err.url}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <BBSInput label="Puerto" keyN="port" placeholder="22" obj={dest} setter={sd}/>
            <BBSInput label="Usuario SSH" keyN="user" placeholder="deploy" obj={dest} setter={sd}/>
          </div>
          <BBSInput label="Contraseña / Llave SSH" keyN="token" placeholder="~/.ssh/id_rsa" type="password" obj={dest} setter={sd} req err={err.token}/>
          <BBSInput label="Directorio destino" keyN="path" placeholder="/home/usuario/mcp-configs" obj={dest} setter={sd}/>
        </>}
        {dest.type==="whm"&&<>
          <BBSInput label="URL del servidor WHM" keyN="url" placeholder="https://servidor.com:2087" type="url" obj={dest} setter={sd} req err={err.url}/>
          <BBSInput label="WHM API Token" keyN="token" placeholder="xxxxxxxxxxxxxxxx" type="password" obj={dest} setter={sd} req err={err.token}/>
        </>}
        {dest.type==="local"&&(
          <div style={{background:BG3,border:`1px solid ${BORDER}`,borderRadius:14,padding:24,textAlign:"center"}}>
            <div style={{fontSize:40,marginBottom:12}}>💾</div>
            <p style={{fontSize:13,color:TEXT2,lineHeight:1.7}}>Los archivos se generarán en pantalla.<br/>Cópialos manualmente a tu configuración de Claude.</p>
          </div>
        )}
      </div>
    );

    // PASO 2
    if(step===2) return(
      <div>
        <h2 style={{fontSize:20,fontWeight:800,color:TEXT,marginBottom:4}}>Selecciona los servicios</h2>
        <p style={{color:TEXT2,fontSize:13,marginBottom:12}}>¿Qué MCPs necesita <strong style={{color:GOLD}}>{client.name}</strong>?</p>
        {err.s&&<div style={{background:"rgba(190,159,65,0.08)",border:`1px solid rgba(190,159,65,0.3)`,borderRadius:8,padding:"8px 12px",fontSize:12,color:GOLD,marginBottom:14}}>{err.s}</div>}
        {CATS.map(cat=>(
          <div key={cat} style={{marginBottom:18}}>
            <h3 style={{fontSize:10,fontWeight:700,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:8,paddingLeft:2}}>{cat}</h3>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {SERVICES.filter(s=>s.cat===cat).map(svc=>{
                const on=sel.includes(svc.id);
                return <button key={svc.id} onClick={()=>tog(svc.id)} className={`service-btn${on?" active":""}`}>
                  <span style={{fontSize:18,flexShrink:0}}>{svc.icon}</span>
                  <div style={{minWidth:0,flex:1}}>
                    <div style={{fontSize:12,fontWeight:700,color:on?GOLD:TEXT,lineHeight:1.2}}>{svc.label}</div>
                    <div style={{fontSize:10,color:TEXT3,lineHeight:1.2,marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{svc.desc}</div>
                  </div>
                  {on&&<span style={{color:GOLD,fontSize:14,flexShrink:0,marginLeft:"auto"}}>✓</span>}
                </button>;
              })}
            </div>
          </div>
        ))}
        {sel.length>0&&(
          <div style={{background:"rgba(190,159,65,0.08)",border:`1px solid rgba(190,159,65,0.25)`,borderRadius:10,padding:"10px 14px",fontSize:12,color:GOLD}}>
            <strong>{sel.length} seleccionados:</strong> {sel.map(id=>SERVICES.find(s=>s.id===id)?.icon).join(" ")}
          </div>
        )}
      </div>
    );

    // PASO 3
    if(step===3){
      const asd=SERVICES.find(s=>s.id===active);
      return(
        <div>
          <h2 style={{fontSize:20,fontWeight:800,color:TEXT,marginBottom:4}}>Credenciales por servicio</h2>
          <p style={{color:TEXT2,fontSize:13,marginBottom:14}}>Ingresa los datos de acceso para cada servicio.</p>
          <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:8,marginBottom:16}}>
            {sel.map(id=>{
              const s=SERVICES.find(x=>x.id===id);
              const done=(FIELDS[id]||[]).filter(f=>f.t!=="sel").some(f=>creds[id]?.[f.k]);
              return <button key={id} onClick={()=>setActive(id)}
                style={{display:"flex",alignItems:"center",gap:5,padding:"6px 12px",borderRadius:20,whiteSpace:"nowrap",
                  border:`1.5px solid ${active===id?GOLD:BORDER}`,
                  background:active===id?"rgba(190,159,65,0.08)":BG3,
                  cursor:"pointer",fontSize:12,fontWeight:600,
                  color:active===id?GOLD:TEXT2,flexShrink:0}}>
                {s.icon} {s.label}
                {done&&<span style={{color:"#5cb85c",marginLeft:2}}>✓</span>}
              </button>;
            })}
          </div>
          {asd&&(
            <div className="bbs-card" style={{padding:16}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,paddingBottom:14,borderBottom:`1px solid ${BORDER}`}}>
                <span style={{fontSize:28}}>{asd.icon}</span>
                <div>
                  <div style={{fontWeight:700,fontSize:15,color:TEXT}}>{asd.label}</div>
                  <div style={{fontSize:11,color:TEXT2}}>{asd.desc}</div>
                </div>
              </div>
              {(FIELDS[active]||[]).map(f=>(
                <FieldInput key={f.k} f={f} val={creds[active]?.[f.k]} onChange={v=>scr(active,f.k,v)}/>
              ))}
            </div>
          )}
          <p style={{textAlign:"center",fontSize:11,color:TEXT3,marginTop:12}}>
            Campos vacíos quedarán como <code style={{color:GOLD}}>CONFIGURAR_AQUI</code>
          </p>
        </div>
      );
    }

    // PASO 4
    if(step===4) return(
      <div>
        <h2 style={{fontSize:20,fontWeight:800,color:TEXT,marginBottom:4}}>Confirmar</h2>
        <p style={{color:TEXT2,fontSize:13,marginBottom:20}}>Revisa todo antes de generar los archivos.</p>
        {[
          {label:"Cliente",body:<>
            <p style={{fontWeight:700,fontSize:14,color:TEXT}}>{client.name}</p>
            {client.contact&&<p style={{fontSize:12,color:TEXT2,marginTop:2}}>{client.contact}{client.email&&` — ${client.email}`}</p>}
            <p style={{fontSize:11,color:TEXT3,marginTop:4}}>Slug: <code style={{color:GOLD,fontWeight:700}}>{sl}</code></p>
          </>},
          {label:"Destino",body:<div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:22}}>{DEST.find(d=>d.id===dest.type)?.icon}</span>
            <div>
              <span style={{fontWeight:700,fontSize:13,color:GOLD}}>{DEST.find(d=>d.id===dest.type)?.label}</span>
              {dest.url&&<p style={{fontSize:11,color:TEXT2,marginTop:2,wordBreak:"break-all"}}>{dest.url}</p>}
            </div>
          </div>},
          {label:`Servicios (${sel.length})`,body:<div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {sel.map(id=>{
              const s=SERVICES.find(x=>x.id===id);
              const done=(FIELDS[id]||[]).filter(f=>f.t!=="sel").some(f=>creds[id]?.[f.k]);
              return <span key={id} style={{padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:600,
                background:done?"rgba(92,184,92,0.12)":"rgba(190,159,65,0.1)",
                color:done?"#5cb85c":GOLD,
                border:`1px solid ${done?"rgba(92,184,92,0.3)":"rgba(190,159,65,0.3)"}`}}>
                {s.icon} {s.label} {done?"✓":"·"}
              </span>;
            })}
          </div>},
        ].map(({label,body})=>(
          <div key={label} className="bbs-card" style={{padding:"14px 16px",marginBottom:10}}>
            <p style={{fontSize:10,fontWeight:700,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>{label}</p>
            {body}
          </div>
        ))}
      </div>
    );

    // PASO 5
    if(step===5) return(
      <div>
        <div style={{textAlign:"center",marginBottom:20}}>
          <div style={{width:72,height:72,borderRadius:"50%",background:"rgba(190,159,65,0.12)",border:`2px solid ${GOLD}`,
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,margin:"0 auto 14px"}}>🎉</div>
          <h2 style={{fontSize:22,fontWeight:800,color:TEXT}}>¡Configuración lista!</h2>
          <p style={{color:TEXT2,fontSize:13,marginTop:4}}><span style={{color:GOLD,fontWeight:700}}>{client.name}</span> — {sel.length} MCPs configurados</p>
        </div>
        {licencia&&(
          <div style={{background:"rgba(190,159,65,0.07)",border:`1px solid rgba(190,159,65,0.35)`,borderRadius:12,
            padding:"12px 16px",marginBottom:16,display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
            <div>
              <p style={{fontSize:10,fontWeight:700,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:4}}>🔑 Licencia BBS</p>
              <code style={{fontSize:15,fontWeight:800,color:GOLD,letterSpacing:"0.08em"}}>{licencia}</code>
            </div>
            <CopyBtn text={licencia}/>
          </div>
        )}

        {/* Tabs de plataforma */}
        <div style={{display:"flex",gap:3,marginBottom:16,background:BG3,borderRadius:10,padding:3,border:`1px solid ${BORDER}`}}>
          {[
            {id:"desktop",icon:"🖥️",label:"Desktop"},
            {id:"web",    icon:"🌐",label:"Web"},
            {id:"mobile", icon:"📱",label:"Mobile"},
          ].map(pt=>(
            <button key={pt.id} onClick={()=>setPlatTab(pt.id)}
              style={{flex:1,padding:"8px 4px",borderRadius:8,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,
                background:platTab===pt.id?"rgba(190,159,65,0.18)":"transparent",
                color:platTab===pt.id?GOLD:TEXT3,transition:"all .15s"}}>
              {pt.icon} {pt.label}
            </button>
          ))}
        </div>

        {/* Tab: Desktop / Cowork */}
        {platTab==="desktop"&&(
          <div>
            <div style={{background:"rgba(190,159,65,0.07)",border:`1px solid rgba(190,159,65,0.25)`,borderRadius:10,padding:"10px 14px",fontSize:12,color:"#c9ab5a",marginBottom:14,lineHeight:1.7}}>
              <strong>Claude Desktop / Cowork:</strong> Pega el JSON en <code style={{color:GOLD}}>claude_desktop_config.json</code> y reinicia.
            </div>
            {[{t:`.env — ${sl}`,c:envTxt},{t:"claude_desktop_config.json",c:cfgTxt}].map(({t,c})=>(
              <div key={t} style={{marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                  background:"#0d0c0c",padding:"9px 14px",borderRadius:"12px 12px 0 0",border:`1px solid ${BORDER}`,borderBottom:"none"}}>
                  <code style={{color:TEXT2,fontSize:11}}>{t}</code>
                  <CopyBtn text={c}/>
                </div>
                <pre style={{background:"#0a0909",color:"#be9f41",fontSize:10,padding:"14px 16px",
                  borderRadius:"0 0 12px 12px",margin:0,overflow:"auto",maxHeight:160,
                  border:`1px solid ${BORDER}`,borderTop:"none",whiteSpace:"pre-wrap",wordBreak:"break-all"}}>
                  {c}
                </pre>
              </div>
            ))}
            <div className="bbs-card" style={{padding:"12px 16px",fontSize:12,lineHeight:1.9}}>
              <p style={{fontWeight:700,color:TEXT2,marginBottom:6,fontSize:11,textTransform:"uppercase",letterSpacing:"0.08em"}}>📋 Instalar</p>
              <ol style={{color:TEXT2,paddingLeft:18}}>
                <li>Copia <code style={{color:GOLD}}>claude_desktop_config.json</code></li>
                <li style={{color:TEXT3}}><strong style={{color:TEXT2}}>Mac:</strong> <code>~/Library/Application Support/Claude/</code></li>
                <li style={{color:TEXT3}}><strong style={{color:TEXT2}}>Win:</strong> <code>%APPDATA%\Claude\</code></li>
                <li>Reinicia Claude Desktop o Cowork</li>
              </ol>
            </div>
          </div>
        )}

        {/* Tab: Claude Web */}
        {platTab==="web"&&(
          <div>
            <div style={{background:"rgba(190,159,65,0.07)",border:`1px solid rgba(190,159,65,0.25)`,borderRadius:10,padding:"10px 14px",fontSize:12,color:"#c9ab5a",marginBottom:14,lineHeight:1.7}}>
              <strong>Claude Web (claude.ai):</strong> Agrega los MCPs remotos en Settings → Integrations.
            </div>
            <div style={{marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                background:"#0d0c0c",padding:"9px 14px",borderRadius:"12px 12px 0 0",border:`1px solid ${BORDER}`,borderBottom:"none"}}>
                <code style={{color:TEXT2,fontSize:11}}>mcp-remote-config.json</code>
                <CopyBtn text={cfgWebTxt}/>
              </div>
              <pre style={{background:"#0a0909",color:"#be9f41",fontSize:10,padding:"14px 16px",
                borderRadius:"0 0 12px 12px",margin:0,overflow:"auto",maxHeight:180,
                border:`1px solid ${BORDER}`,borderTop:"none",whiteSpace:"pre-wrap",wordBreak:"break-all"}}>
                {cfgWebTxt}
              </pre>
            </div>
            <div className="bbs-card" style={{padding:"12px 16px",fontSize:12,lineHeight:1.9}}>
              <p style={{fontWeight:700,color:TEXT2,marginBottom:6,fontSize:11,textTransform:"uppercase",letterSpacing:"0.08em"}}>🌐 Activar en Claude Web</p>
              <ol style={{color:TEXT2,paddingLeft:18}}>
                <li>Abre <code style={{color:GOLD}}>claude.ai</code> → Perfil → <strong>Settings</strong></li>
                <li>Sección <strong>Integrations</strong> → <strong>Add Integration</strong></li>
                <li>Pega la URL de cada MCP</li>
                <li style={{color:TEXT3}}>Formato: <code style={{color:GOLD,fontSize:10}}>https://mcp.bbscomunicaciones.com/[id]-mcp</code></li>
                <li style={{color:TEXT3}}>Usa tu licencia como Bearer token</li>
              </ol>
            </div>
          </div>
        )}

        {/* Tab: Mobile RC */}
        {platTab==="mobile"&&(
          <div>
            <div style={{background:"rgba(190,159,65,0.07)",border:`1px solid rgba(190,159,65,0.25)`,borderRadius:10,padding:"10px 14px",fontSize:12,color:"#c9ab5a",marginBottom:14,lineHeight:1.7}}>
              <strong>Claude Mobile (RC):</strong> Misma configuración remota que Claude Web. Requiere app RC.
            </div>
            <div style={{marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                background:"#0d0c0c",padding:"9px 14px",borderRadius:"12px 12px 0 0",border:`1px solid ${BORDER}`,borderBottom:"none"}}>
                <code style={{color:TEXT2,fontSize:11}}>mcp-remote-config.json</code>
                <CopyBtn text={cfgWebTxt}/>
              </div>
              <pre style={{background:"#0a0909",color:"#be9f41",fontSize:10,padding:"14px 16px",
                borderRadius:"0 0 12px 12px",margin:0,overflow:"auto",maxHeight:180,
                border:`1px solid ${BORDER}`,borderTop:"none",whiteSpace:"pre-wrap",wordBreak:"break-all"}}>
                {cfgWebTxt}
              </pre>
            </div>
            <div className="bbs-card" style={{padding:"12px 16px",fontSize:12,lineHeight:1.9}}>
              <p style={{fontWeight:700,color:TEXT2,marginBottom:6,fontSize:11,textTransform:"uppercase",letterSpacing:"0.08em"}}>📱 Activar en Claude RC</p>
              <ol style={{color:TEXT2,paddingLeft:18}}>
                <li>Abre <strong>Claude RC</strong> en tu dispositivo iOS/Android</li>
                <li>Ve a <strong>Perfil → Settings → Integrations</strong></li>
                <li>Agrega cada MCP con su URL remota</li>
                <li style={{color:TEXT3}}>Licencia: <code style={{color:GOLD,fontSize:10}}>{licencia||"TU-LICENCIA-BBS"}</code></li>
                <li style={{color:TEXT3}}>URL base: <code style={{color:GOLD,fontSize:10}}>https://mcp.bbscomunicaciones.com/</code></li>
              </ol>
            </div>
          </div>
        )}
      </div>
    );
  };

  return(
    <div style={{minHeight:"100vh",background:"transparent",display:"flex",flexDirection:"column",alignItems:"center",padding:"32px 16px 60px"}}>

      {/* Header */}
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",marginBottom:28}}>
        <img src="https://sistema.bbscomunicaciones.com/uploads/company/3d725895a929356834cd34be789253d9.png"
          alt="BBS Comunicaciones" style={{height:48,marginBottom:14,filter:"drop-shadow(0 0 12px rgba(190,159,65,0.3))"}}
          onError={e=>{e.target.style.display="none";}}/>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:15,fontWeight:800,color:TEXT}}>MCP Installer</span>
          <span style={{width:4,height:4,borderRadius:"50%",background:GOLD,display:"inline-block"}}/>
          <span style={{fontSize:11,color:TEXT3}}>Web · Desktop · Mobile</span>
        </div>
      </div>

      {/* Progress chips */}
      <div style={{display:"flex",gap:4,flexWrap:"wrap",justifyContent:"center",marginBottom:24,maxWidth:600}}>
        {STEPS.map((s,i)=>{
          const done=step>i, cur=step===i;
          return(
            <div key={i} className="step-chip"
              style={{background:done?"rgba(190,159,65,0.12)":cur?"rgba(190,159,65,0.07)":"transparent",
                color:done?GOLD:cur?GOLD:TEXT3,
                border:`1px solid ${done?GOLD:cur?"rgba(190,159,65,0.4)":BORDER}`}}>
              <div className="step-dot"
                style={{background:done||cur?GOLD:BORDER2,color:done||cur?BG:TEXT3}}>
                {done?"✓":i+1}
              </div>
              {s}
            </div>
          );
        })}
      </div>

      {/* Main card */}
      <div style={{width:"100%",maxWidth:520,background:BG2,borderRadius:20,
        border:`1px solid ${BORDER}`,
        boxShadow:"0 8px 40px rgba(0,0,0,.5)",overflow:"hidden"}}>

        {/* Accent top bar */}
        <div style={{height:3,background:`linear-gradient(90deg,${GOLD2},${GOLD},${GOLD2})`}}/>

        {/* Body */}
        <div style={{padding:"24px 24px 8px",maxHeight:"62vh",overflowY:"auto"}}>
          {renderBody()}
        </div>

        {/* Footer */}
        <div style={{padding:"16px 24px",borderTop:`1px solid ${BORDER}`,display:"flex",justifyContent:"space-between",alignItems:"center",background:BG}}>
          {step===5 ? <>
            <button onClick={reset} className="bbs-btn-secondary" style={{padding:"9px 18px",borderRadius:10,fontSize:13}}>
              ↺ Nuevo cliente
            </button>
            <span style={{fontSize:10,color:TEXT3}}>© BBS Comunicaciones</span>
          </> : <>
            <button onClick={back} disabled={step===0} className="bbs-btn-secondary"
              style={{padding:"9px 18px",borderRadius:10,fontSize:13,opacity:step===0?.3:1,cursor:step===0?"not-allowed":"pointer"}}>
              ← Atrás
            </button>
            <button onClick={step===4?generar:next} disabled={registrando} className="bbs-btn-primary"
              style={{padding:"10px 24px",borderRadius:10,fontSize:13,opacity:registrando?0.7:1}}>
              {registrando?"⏳ Registrando...":step===4?"🚀 Generar configuración":step===3?"Revisar →":"Siguiente →"}
            </button>
          </>}
        </div>
      </div>

      {/* Footer logo */}
      <div style={{marginTop:32,textAlign:"center"}}>
        <p style={{fontSize:11,color:TEXT3}}>© 2026 BBS Comunicaciones — it@bbscomunicaciones.com</p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
