<script>
// ── Particle system ──────────────────────────────────────────────────────────
(function(){
  const canvas = document.getElementById('particles-canvas');
  const ctx    = canvas.getContext('2d');
  const GOLD   = 'rgba(190,159,65,';
  let W, H, particles = [], mouse = {x:-9999,y:-9999};

  function resize(){
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function rand(a,b){ return a + Math.random()*(b-a); }

  function Particle(){
    this.reset = function(init){
      this.x    = rand(0,W);
      this.y    = init ? rand(0,H) : H + 10;
      this.r    = rand(0.6,2.2);
      this.vx   = rand(-0.15,0.15);
      this.vy   = rand(-0.35,-0.08);
      this.a    = rand(0.08,0.45);
      this.da   = rand(-0.0004,0.0004);
      this.life = rand(0.6,1);
      this.age  = 0;
    };
    this.reset(true);

    this.update = function(){
      this.x  += this.vx;
      this.y  += this.vy;
      this.a  += this.da;
      this.a   = Math.max(0.04, Math.min(0.55, this.a));
      this.age += 0.003;

      // subtle mouse repulsion
      let dx = this.x - mouse.x, dy = this.y - mouse.y;
      let dist = Math.sqrt(dx*dx+dy*dy);
      if(dist < 90){
        let force = (90-dist)/90 * 0.4;
        this.vx += dx/dist * force * 0.06;
        this.vy += dy/dist * force * 0.06;
      }

      if(this.y < -10 || this.age > this.life) this.reset(false);
    };

    this.draw = function(){
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
      ctx.fillStyle = GOLD + this.a + ')';
      ctx.fill();
    };
  }

  function init(){
    resize();
    particles = [];
    let count = Math.floor((W*H)/12000);
    count = Math.max(40, Math.min(count, 130));
    for(let i=0;i<count;i++){
      let p = new Particle();
      particles.push(p);
    }
  }

  // Connection lines between nearby particles
  function drawLines(){
    for(let i=0;i<particles.length;i++){
      for(let j=i+1;j<particles.length;j++){
        let dx = particles[i].x - particles[j].x;
        let dy = particles[i].y - particles[j].y;
        let d  = Math.sqrt(dx*dx+dy*dy);
        if(d < 110){
          let alpha = (1 - d/110) * 0.08;
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = GOLD + alpha + ')';
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
  }

  function loop(){
    ctx.clearRect(0,0,W,H);
    drawLines();
    particles.forEach(p=>{ p.update(); p.draw(); });
    requestAnimationFrame(loop);
  }

  window.addEventListener('resize', ()=>{ resize(); init(); });
  document.addEventListener('mousemove', e=>{ mouse.x=e.clientX; mouse.y=e.clientY; });
  document.addEventListener('mouseleave', ()=>{ mouse.x=-9999; mouse.y=-9999; });

  init();
  loop();
})();
</script>

function genEnv(client, creds, sels){
  const lines=[`# BBS Comunicaciones — MCPs`,`# Cliente: ${client.name}`,`# ${new Date().toISOString().slice(0,10)}`,`# ⚠️ PRIVADO — NO SUBIR A GIT`,``];
  sels.forEach(id=>{
    const s=SERVICES.find(x=>x.id===id);
    lines.push(`# ── ${s.label}`);
    (FIELDS[id]||[]).forEach(f=>lines.push(`${f.k}=${creds[id]?.[f.k]||"CONFIGURAR_AQUI"}`));
    lines.push("");
  });
  return lines.join("\n");
}

function genConfig(client, creds, sels){
  const sl=slug(client.name);
  const servers={};
  sels.forEach(id=>{
    const env={};
    (FIELDS[id]||[]).forEach(f=>{env[f.k]=creds[id]?.[f.k]||"CONFIGURAR_AQUI";});
    servers[`${id}-${sl}`]={command:"npx",args:["-y",`@bbs/${id}-mcp`],env};
  });
  return JSON.stringify({mcpServers:servers},null,2);
}

function genConfigWeb(licencia, client, sels){
  const sl=slug(client.name);
  const servers={};
  sels.forEach(id=>{
    servers[`${id}-${sl}`]={
      url:`https://mcp.bbscomunicaciones.com/${id}-mcp`,
      headers:{
        "Authorization":`Bearer ${licencia||"TU-LICENCIA-BBS"}`,
        "X-Client-Id":sl
      }
    };
  });
  return JSON.stringify({mcpServers:servers},null,2);
}

const MCP_API = "https://control.bbscomunicaciones.com/mcp_licencias.php";

async function registrarLicencia(client, dest, sel){
  try {
    const res = await fetch(MCP_API + "?action=registrar", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        cliente:     client.name,
        email:       client.email  || "",
        contacto:    client.contact|| "",
        destino:     dest.type,
        destino_url: dest.url      || "",
        servicios:   sel,
        notas:       client.notes  || "",
      })
    });
    const data = await res.json();
    return data.ok ? data.licencia : null;
  } catch(e) { return null; }
}

                          </span>;
                    })()}
                    {SERVICE_GUIDES[active].link2&&(
                      <a href={SERVICE_GUIDES[active].link2} target="_blank" rel="noopener noreferrer"
                        style={{display:"inline-flex",alignItems:"center",gap:4,padding:"6px 12px",borderRadius:8,
                          background:"rgba(122,170,240,0.08)",border:`1px solid rgba(122,170,240,0.25)`,
                          color:"#7aaaf0",fontSize:10,fontWeight:700,textDecoration:"none"}}>
                        🔗 {SERVICE_GUIDES[active].link2label||"Herramienta adicional"}
                      </a>
                    )}
                  </div>
                </div>
              )}
            </div>
          )}
          <p style={{textAlign:"center",fontSize:11,color:TEXT3,marginTop:12}}>
            Campos vacíos quedarán como <code style={{color:GOLD}}>CONFIGURAR_AQUI</code>
          </p>
        </div>
      );
    }

    // PASO 4
    if(step===4) return(
      <div>
        <h2 style={{fontSize:20,fontWeight:800,color:TEXT,marginBottom:4}}>Confirmar</h2>
        <p style={{color:TEXT2,fontSize:13,marginBottom:20}}>Revisa todo antes de generar los archivos.</p>
        {[
          {label:"Cliente",body:<>
            <p style={{fontWeight:700,fontSize:14,color:TEXT}}>{client.name}</p>
            {client.contact&&<p style={{fontSize:12,color:TEXT2,marginTop:2}}>{client.contact}{client.email&&` — ${client.email}`}</p>}
            <p style={{fontSize:11,color:TEXT3,marginTop:4}}>Slug: <code style={{color:GOLD,fontWeight:700}}>{sl}</code></p>
          </>},
          {label:"Destino",body:<div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:22}}>{DEST.find(d=>d.id===dest.type)?.icon}</span>
            <div>
              <span style={{fontWeight:700,fontSize:13,color:GOLD}}>{DEST.find(d=>d.id===dest.type)?.label}</span>
              {dest.url&&<p style={{fontSize:11,color:TEXT2,marginTop:2,wordBreak:"break-all"}}>{dest.url}</p>}
            </div>
          </div>},
          {label:`Servicios (${sel.length})`,body:<div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {sel.map(id=>{
              const s=SERVICES.find(x=>x.id===id);
              const done=(FIELDS[id]||[]).filter(f=>f.t!=="sel").some(f=>creds[id]?.[f.k]);
              return <span key={id} style={{padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:600,
                background:done?"rgba(92,184,92,0.12)":"rgba(190,159,65,0.1)",
                color:done?"#5cb85c":GOLD,
                border:`1px solid ${done?"rgba(92,184,92,0.3)":"rgba(190,159,65,0.3)"}`}}>
                {s.icon} {s.label} {done?"✓":"·"}
              </span>;
            })}
          </div>},
        ].map(({label,body})=>(
          <div key={label} className="bbs-card" style={{padding:"14px 16px",marginBottom:10}}>
            <p style={{fontSize:10,fontWeight:700,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>{label}</p>
            {body}
          </div>
        ))}
      </div>
    );

    // PASO 5
    if(step===5) return(
      <div>
        <div style={{textAlign:"center",marginBottom:20}}>
          <div style={{width:72,height:72,borderRadius:"50%",background:"rgba(190,159,65,0.12)",border:`2px solid ${GOLD}`,
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,margin:"0 auto 14px"}}>🎉</div>
          <h2 style={{fontSize:22,fontWeight:800,color:TEXT}}>¡Configuración lista!</h2>
          <p style={{color:TEXT2,fontSize:13,marginTop:4}}><span style={{color:GOLD,fontWeight:700}}>{client.name}</span> — {sel.length} MCPs configurados</p>
        </div>
        {licencia&&(
          <div style={{background:"rgba(190,159,65,0.07)",border:`1px solid rgba(190,159,65,0.35)`,borderRadius:12,
            padding:"12px 16px",marginBottom:16,display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
            <div>
              <p style={{fontSize:10,fontWeight:700,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:4}}>🔑 Licencia BBS</p>
              <code style={{fontSize:15,fontWeight:800,color:GOLD,letterSpacing:"0.08em"}}>{licencia}</code>
            </div>
            <CopyBtn text={licencia}/>
          </div>
        )}

        {/* Tabs de plataforma */}
        <div style={{display:"flex",gap:3,marginBottom:16,background:BG3,borderRadius:10,padding:3,border:`1px solid ${BORDER}`}}>
          {[
            {id:"desktop",icon:"🖥️",label:"Desktop"},
            {id:"web",    icon:"🌐",label:"Web"},
            {id:"mobile", icon:"📱",label:"Mobile"},
          ].map(pt=>(
            <button key={pt.id} onClick={()=>setPlatTab(pt.id)}
              style={{flex:1,padding:"8px 4px",borderRadius:8,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,
                background:platTab===pt.id?"rgba(190,159,65,0.18)":"transparent",
                color:platTab===pt.id?GOLD:TEXT3,transition:"all .15s"}}>
              {pt.icon} {pt.label}
            </button>
          ))}
        </div>

        {/* Tab: Desktop / Cowork */}
        {platTab==="desktop"&&(
          <div>
            <div style={{background:"rgba(190,159,65,0.07)",border:`1px solid rgba(190,159,65,0.25)`,borderRadius:10,padding:"10px 14px",fontSize:12,color:"#c9ab5a",marginBottom:14,lineHeight:1.7}}>
              <strong>Claude Desktop / Cowork:</strong> Pega el JSON en <code style={{color:GOLD}}>claude_desktop_config.json</code> y reinicia.
            </div>
            {[{t:`.env — ${sl}`,c:envTxt},{t:"claude_desktop_config.json",c:cfgTxt}].map(({t,c})=>(
              <div key={t} style={{marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                  background:"#0d0c0c",padding:"9px 14px",borderRadius:"12px 12px 0 0",border:`1px solid ${BORDER}`,borderBottom:"none"}}>
                  <code style={{color:TEXT2,fontSize:11}}>{t}</code>
                  <CopyBtn text={c}/>
                </div>
                <pre style={{background:"#0a0909",color:"#be9f41",fontSize:10,padding:"14px 16px",
                  borderRadius:"0 0 12px 12px",margin:0,overflow:"auto",maxHeight:160,
                  border:`1px solid ${BORDER}`,borderTop:"none",whiteSpace:"pre-wrap",wordBreak:"break-all"}}>
                  {c}
                </pre>
              </div>
            ))}
            <div className="bbs-card" style={{padding:"12px 16px",fontSize:12,lineHeight:1.9}}>
              <p style={{fontWeight:700,color:TEXT2,marginBottom:6,fontSize:11,textTransform:"uppercase",letterSpacing:"0.08em"}}>📋 Instalar</p>
              <ol style={{color:TEXT2,paddingLeft:18}}>
                <li>Copia <code style={{color:GOLD}}>claude_desktop_config.json</code></li>
                <li style={{color:TEXT3}}><strong style={{color:TEXT2}}>Mac:</strong> <code>~/Library/Application Support/Claude/</code></li>
                <li style={{color:TEXT3}}><strong style={{color:TEXT2}}>Win:</strong> <code>%APPDATA%\Claude\</code></li>
                <li>Reinicia Claude Desktop o Cowork</li>
              </ol>
            </div>
          </div>
        )}

        {/* Tab: Claude Web */}
        {platTab==="web"&&(
          <div>
            <div style={{background:"rgba(190,159,65,0.07)",border:`1px solid rgba(190,159,65,0.25)`,borderRadius:10,padding:"10px 14px",fontSize:12,color:"#c9ab5a",marginBottom:14,lineHeight:1.7}}>
              <strong>Claude Web (claude.ai):</strong> Agrega los MCPs remotos en Settings → Integrations.
            </div>
            <div style={{marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                background:"#0d0c0c",padding:"9px 14px",borderRadius:"12px 12px 0 0",border:`1px solid ${BORDER}`,borderBottom:"none"}}>
                <code style={{color:TEXT2,fontSize:11}}>mcp-remote-config.json</code>
                <CopyBtn text={cfgWebTxt}/>
              </div>
              <pre style={{background:"#0a0909",color:"#be9f41",fontSize:10,padding:"14px 16px",
                borderRadius:"0 0 12px 12px",margin:0,overflow:"auto",maxHeight:180,
                border:`1px solid ${BORDER}`,borderTop:"none",whiteSpace:"pre-wrap",wordBreak:"break-all"}}>
                {cfgWebTxt}
              </pre>
            </div>
            <div className="bbs-card" style={{padding:"12px 16px",fontSize:12,lineHeight:1.9}}>
              <p style={{fontWeight:700,color:TEXT2,marginBottom:6,fontSize:11,textTransform:"uppercase",letterSpacing:"0.08em"}}>🌐 Activar en Claude Web</p>
              <ol style={{color:TEXT2,paddingLeft:18}}>
                <li>Abre <code style={{color:GOLD}}>claude.ai</code> → Perfil → <strong>Settings</strong></li>
                <li>Sección <strong>Integrations</strong> → <strong>Add Integration</strong></li>
                <li>Pega la URL de cada MCP</li>
                <li style={{color:TEXT3}}>Formato: <code style={{color:GOLD,fontSize:10}}>https://mcp.bbscomunicaciones.com/[id]-mcp</code></li>
                <li style={{color:TEXT3}}>Usa tu licencia como Bearer token</li>
              </ol>
            </div>
          </div>
        )}

        {/* Tab: Mobile RC */}
        {platTab==="mobile"&&(
          <div>
            <div style={{background:"rgba(190,159,65,0.07)",border:`1px solid rgba(190,159,65,0.25)`,borderRadius:10,padding:"10px 14px",fontSize:12,color:"#c9ab5a",marginBottom:14,lineHeight:1.7}}>
              <strong>Claude Mobile (RC):</strong> Misma configuración remota que Claude Web. Requiere app RC.
            </div>
            <div style={{marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                background:"#0d0c0c",padding:"9px 14px",borderRadius:"12px 12px 0 0",border:`1px solid ${BORDER}`,borderBottom:"none"}}>
                <code style={{color:TEXT2,fontSize:11}}>mcp-remote-config.json</code>
                <CopyBtn text={cfgWebTxt}/>
              </div>
              <pre style={{background:"#0a0909",color:"#be9f41",fontSize:10,padding:"14px 16px",
                borderRadius:"0 0 12px 12px",margin:0,overflow:"auto",maxHeight:180,
                border:`1px solid ${BORDER}`,borderTop:"none",whiteSpace:"pre-wrap",wordBreak:"break-all"}}>
                {cfgWebTxt}
              </pre>
            </div>
            <div className="bbs-card" style={{padding:"12px 16px",fontSize:12,lineHeight:1.9}}>
              <p style={{fontWeight:700,color:TEXT2,marginBottom:6,fontSize:11,textTransform:"uppercase",letterSpacing:"0.08em"}}>📱 Activar en Claude RC</p>
              <ol style={{color:TEXT2,paddingLeft:18}}>
                <li>Abre <strong>Claude RC</strong> en tu dispositivo iOS/Android</li>
                <li>Ve a <strong>Perfil → Settings → Integrations</strong></li>
                <li>Agrega cada MCP con su URL remota</li>
                <li style={{color:TEXT3}}>Licencia: <code style={{color:GOLD,fontSize:10}}>{licencia||"TU-LICENCIA-BBS"}</code></li>
                <li style={{color:TEXT3}}>URL base: <code style={{color:GOLD,fontSize:10}}>https://mcp.bbscomunicaciones.com/</code></li>
              </ol>
            </div>
          </div>
        )}
      </div>
    );
  };

  return(
    <div style={{minHeight:"100vh",background:"transparent",display:"flex",flexDirection:"column",alignItems:"center",padding:"32px 16px 60px"}}>

      {/* Header */}
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",marginBottom:28,position:"relative",width:"100%",maxWidth:560}}>
        <button onClick={()=>setLightMode(m=>!m)} className="theme-toggle" title={lightMode?"Modo oscuro":"Modo claro"}>
          {lightMode?"🌙":"☀️"}
        </button>
        <img src="https://sistema.bbscomunicaciones.com/uploads/company/3d725895a929356834cd34be789253d9.png"
          alt="BBS Comunicaciones" style={{height:48,marginBottom:14,filter:"drop-shadow(0 0 12px rgba(190,159,65,0.3))"}}
          onError={e=>{e.target.style.display="none";}}/>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:15,fontWeight:800,color:TEXT}}>MCP Installer</span>
          <span style={{width:4,height:4,borderRadius:"50%",background:GOLD,display:"inline-block"}}/>
          <span style={{fontSize:11,color:TEXT3}}>Web · Desktop · Mobile</span>
        </div>
      </div>

      {/* Progress chips */}
      <div style={{display:"flex",gap:4,flexWrap:"wrap",justifyContent:"center",marginBottom:24,maxWidth:600}}>
        {STEPS.map((s,i)=>{
          const done=step>i, cur=step===i;
          return(
            <div key={i} className="step-chip"
              style={{background:done?"rgba(190,159,65,0.12)":cur?"rgba(190,159,65,0.07)":"transparent",
                color:done?GOLD:cur?GOLD:TEXT3,
                border:`1px solid ${done?GOLD:cur?"rgba(190,159,65,0.4)":BORDER}`}}>
              <div className="step-dot"
                style={{background:done||cur?GOLD:BORDER2,color:done||cur?BG:TEXT3}}>
                {done?"✓":i+1}
              </div>
              {s}
            </div>
          );
        })}
      </div>

      {/* Main card */}
      <div style={{width:"100%",maxWidth:520,background:BG2,borderRadius:20,
        border:`1px solid ${BORDER}`,
        boxShadow:"0 8px 40px rgba(0,0,0,.5)",overflow:"hidden"}}>

        {/* Accent top bar */}
        <div style={{height:3,background:`linear-gradient(90deg,${GOLD2},${GOLD},${GOLD2})`}}/>

        {/* Body */}
        <div style={{padding:"24px 24px 8px",maxHeight:"62vh",overflowY:"auto"}}>
          {renderBody()}
        </div>

        {/* Footer */}
        <div style={{padding:"16px 24px",borderTop:`1px solid ${BORDER}`,display:"flex",justifyContent:"space-between",alignItems:"center",background:BG}}>
          {step===5 ? <>
            <button onClick={reset} className="bbs-btn-secondary" style={{padding:"9px 18px",borderRadius:10,fontSize:13}}>
              ↺ Nuevo cliente
            </button>
            <span style={{fontSize:10,color:TEXT3}}>© BBS Comunicaciones</span>
          </> : <>
            <button onClick={back} disabled={step===0} className="bbs-btn-secondary"
              style={{padding:"9px 18px",borderRadius:10,fontSize:13,opacity:step===0?.3:1,cursor:step===0?"not-allowed":"pointer"}}>
              ← Atrás
            </button>
            <button onClick={step===4?generar:next} disabled={registrando} className="bbs-btn-primary"
              style={{padding:"10px 24px",borderRadius:10,fontSize:13,opacity:registrando?0.7:1}}>
              {registrando?"⏳ Registrando...":step===4?"🚀 Generar configuración":step===3?"Revisar →":"Siguiente →"}
            </button>
          </>}
        </div>
      </div>

      {/* Footer logo */}
      <div style={{marginTop:32,textAlign:"center"}}>
        <p style={{fontSize:11,color:TEXT3}}>© 2026 BBS Comunicaciones — it@bbscomunicaciones.com</p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
